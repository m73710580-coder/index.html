<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة شكر مخصصة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e91e63;
            --secondary: #f06292;
            --flap: #ff80ab;
            --bg-light: #ffe6f2;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-light) 0%, #ffcce6 100%);
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hearts-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            color: #ff69b4;
            font-size: 20px;
            animation: floatUp linear forwards;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-110vh) scale(1.5) rotate(45deg); opacity: 0; }
        }

        .envelope-container {
            position: relative;
            width: 300px;
            height: 200px;
            z-index: 50;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .env-back {
            position: absolute;
            width: 100%; height: 100%;
            background: #f48fb1;
            border-radius: 10px;
            z-index: 2;
        }

        .env-front {
            position: absolute;
            bottom: 0; left: 0; width: 0; height: 0;
            border-left: 150px solid var(--secondary);
            border-right: 150px solid var(--secondary);
            border-bottom: 110px solid var(--primary);
            border-top: 90px solid transparent;
            border-radius: 0 0 10px 10px;
            z-index: 10;
        }

        .env-flap {
            position: absolute;
            top: 0; left: 0; width: 0; height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--flap);
            transform-origin: top center;
            transition: transform 0.6s ease-in-out;
            z-index: 15;
        }

        .letter {
            position: absolute;
            left: 10px;
            bottom: 5px;
            width: 280px;
            height: 180px;
            background: #fff;
            border-radius: 5px;
            z-index: 5;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .is-open .env-flap { transform: rotateX(180deg); z-index: 1; }
        .is-ejected .letter { transform: translateY(-130%); z-index: 60; }
        
        .is-zoomed .letter {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) !important;
            width: 90vw;
            max-width: 450px;
            height: auto;
            max-height: 85vh;
            z-index: 1000;
            padding: 25px;
            border-radius: 20px;
            overflow-y: auto;
            box-shadow: 0 25px 60px rgba(233, 30, 99, 0.2);
            justify-content: flex-start;
            background-color: #ffffff;
            border: 2px solid var(--bg-light);
        }

        .letter-content {
            opacity: 0;
            visibility: hidden;
            width: 100%;
        }

        .is-zoomed .letter-content {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.4s ease 0.3s;
        }

        .letter-img {
            width: 100%;
            height: auto;
            max-height: 350px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .letter p {
            font-size: 19px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .close-btn {
            display: none;
            width: 100%;
            max-width: 200px;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 17px;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: var(--secondary);
        }

        .is-zoomed .close-btn {
            display: block;
            margin: 0 auto;
        }

    </style>
</head>
<body>

    <div class="hearts-layer" id="hearts"></div>

    <div class="envelope-container">
        <div class="envelope" id="env">
            <div class="env-back"></div>
            
            <div class="letter" id="letter">
                <div class="letter-content">
                    <img src="https://i.ibb.co/7dGQKkNx/image-f9edfe72.png" alt="صورة تقدير" class="letter-img">
                    <p>
                        كاميليا انتي مش متخيلة انا فضلت قد ايه
                        اعمل في الموقع ده علشان بس اقولك شكرا
                    </p>
                    <button class="close-btn" id="close">إغلاق</button>
                </div>
            </div>

            <div class="env-front"></div>
            <div class="env-flap"></div>
        </div>
    </div>

    <script>
        const heartContainer = document.getElementById('hearts');
        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '❤';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 15) + 'px';
            h.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heartContainer.appendChild(h);
            setTimeout(() => h.remove(), 7000);
        }
        setInterval(createHeart, 400);

        const env = document.getElementById('env');
        const close = document.getElementById('close');
        
        let state = 0;

        env.addEventListener('click', () => {
            if (state !== 0) return;
            state = 1;
            env.classList.add('is-open');
            setTimeout(() => env.classList.add('is-ejected'), 700);
            setTimeout(() => {
                env.classList.add('is-zoomed');
            }, 1500);
        });

        close.addEventListener('click', (e) => {
            e.stopPropagation();
            env.classList.remove('is-zoomed');
            setTimeout(() => env.classList.remove('is-ejected'), 700);
            setTimeout(() => {
                env.classList.remove('is-open');
                state = 0;
            }, 1400);
        });
    </script>
</body>
</html>
